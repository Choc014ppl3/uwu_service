services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      - uwu_service
    restart: unless-stopped

  uwu_service:
    image: ghcr.io/choc014ppl3/uwu_service:latest
    expose:
      - "${SERVER_HTTP_PORT:-8080}"
    environment:
      # Server
      - SERVER_HOST=${SERVER_HOST:-0.0.0.0}
      - SERVER_HTTP_PORT=${SERVER_HTTP_PORT:-8080}
      - SERVER_ENV=production
      # CORS
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
      - CORS_ALLOWED_METHODS=${CORS_ALLOWED_METHODS:-GET,POST,PUT,DELETE,OPTIONS}
      - CORS_ALLOWED_HEADERS=${CORS_ALLOWED_HEADERS:-Accept,Authorization,Content-Type,X-Request-ID}
      # Queue
      - QUEUE_WORKER_COUNT=${QUEUE_WORKER_COUNT:-4}
      - QUEUE_BUFFER_SIZE=${QUEUE_BUFFER_SIZE:-100}
      # Timeouts
      - SERVER_READ_TIMEOUT=${SERVER_READ_TIMEOUT:-15s}
      - SERVER_WRITE_TIMEOUT=${SERVER_WRITE_TIMEOUT:-15s}
      - SERVER_IDLE_TIMEOUT=${SERVER_IDLE_TIMEOUT:-60s}
      - SERVER_SHUTDOWN_TIMEOUT=${SERVER_SHUTDOWN_TIMEOUT:-30s}
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      # Database
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      # AI Services
      - GEMINI_SA_BASE64=${GEMINI_SA_BASE64}
      - GCP_LOCATION=${GCP_LOCATION}
      # Azure AI Speech
      - AZURE_AI_SPEECH_KEY=${AZURE_AI_SPEECH_KEY}
      - AZURE_SERVICE_REGION=${AZURE_SERVICE_REGION}
      # Azure OpenAI Whisper
      - AZURE_WHISPER_ENDPOINT=${AZURE_WHISPER_ENDPOINT}
      - AZURE_WHISPER_KEY=${AZURE_WHISPER_KEY}
      # Azure GPT5 Nano Chat
      - AZURE_GPT5_NANO_ENDPOINT=${AZURE_GPT5_NANO_ENDPOINT}
      - AZURE_GPT5_NANO_KEY=${AZURE_GPT5_NANO_KEY}
      # Cloudflare R2
      - CLOUDFLARE_ACCESS_KEY_ID=${CLOUDFLARE_ACCESS_KEY_ID}
      - CLOUDFLARE_SECRET_ACCESS_KEY=${CLOUDFLARE_SECRET_ACCESS_KEY}
      - CLOUDFLARE_R2_ENDPOINT=${CLOUDFLARE_R2_ENDPOINT}
      - CLOUDFLARE_PUBLIC_URL=${CLOUDFLARE_PUBLIC_URL}
      - CLOUDFLARE_BUCKET_NAME=${CLOUDFLARE_BUCKET_NAME}
      # Redis
      - REDIS_URL=${REDIS_URL}
      # JWT
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  caddy_data:
  caddy_config:
  redis_data:
  postgres_data:

